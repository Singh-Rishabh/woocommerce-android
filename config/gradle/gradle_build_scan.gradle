Boolean userEnabledTracking = secretProperties.get('tracksEnabled')?.toBoolean() ?: false
Boolean isBuildOnCI = (System.getenv('CI') ?: false).toBoolean()

if (isBuildOnCI || userEnabledTracking) {
    buildScan {
        termsOfServiceUrl = 'https://gradle.com/terms-of-service'
        termsOfServiceAgree = 'yes'
        publishAlways()
        if (isBuildOnCI) {
            tag 'CI'
            uploadInBackground = false
        } else {
            obfuscation {
                username { username -> username.digest('SHA-1') }
                hostname { _ -> "" }
                ipAddresses { addresses -> addresses.collect { address -> "0.0.0.0" } }
            }
        }
    }
}
