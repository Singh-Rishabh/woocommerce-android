Boolean isBuildOnCI = (System.getenv('CI') ?: false).toBoolean()

if (isBuildOnCI) {
    develocity {
        buildScan {
            termsOfUseUrl = 'https://gradle.com/terms-of-service'
            termsOfUseAgree = 'yes'
            tag 'CI'
            publishing.onlyIf { true }
            uploadInBackground = false
        }
    }
} else {
    develocity {
        buildScan {
            publishing.onlyIf { false }
        }
    }
}
