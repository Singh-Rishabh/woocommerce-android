// Only run build scan on CI builds.
develocity {
    buildScan {
        termsOfUseUrl = 'https://gradle.com/terms-of-service'
        termsOfUseAgree = 'yes'
        if (gradle.ext.isCi) {
            tag 'CI'
            uploadInBackground = false
        } else {
            obfuscation {
                username { username -> username.digest('SHA-1') }
                hostname { _ -> "" }
                ipAddresses { addresses -> addresses.collect { address -> "0.0.0.0" } }
            }
        }
    }
}
